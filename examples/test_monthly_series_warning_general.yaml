version: general
basic:
  projectPath: E:\BMPs\TxtInOut
  workPath: ./work_warning
  command: swat.exe
parameters:
  design:
    - name: CN2
      type: float
      bounds: [35, 98]
    - name: ALPHA_BF
      type: float
      bounds: [0, 1]
    - name: GW_DELAY
      type: float
      bounds: [0, 500]
  physical:
    - name: CN2
      type: float
      bounds: [35, 98]
      mode: v
      writerType: fixed_width
      file:
        name: '*.mgt'
        line: 11
        start: 1
        width: 16
        precision: 2
        maxNum: 1
    - name: ALPHA_BF
      type: float
      bounds: [0, 1]
      mode: v
      writerType: fixed_width
      file:
        name: '*.gw'
        line: 5
        start: 1
        width: 16
        precision: 4
        maxNum: 1
    - name: GW_DELAY
      type: float
      bounds: [0, 500]
      mode: v
      writerType: fixed_width
      file:
        name: '*.gw'
        line: 4
        start: 1
        width: 16
        precision: 4
        maxNum: 1
  hardBound: true
series:
  - id: flow_month
    desc: Monthly streamflow
    sim:
      file: output.rch
      colSpan: [50, 61]
      readerType: text
      rowRanges:
        - [133, 753, 62]
        - [877, 1559, 62]
        - [1683, 2303, 62]
    obs:
      file: obs_flow_monthly.txt
      rowRanges:
        - [2, 35]
      colSpan: [1, 12]
      readerType: text
    size: 34
  - id: flow_matrix
    desc: Derived matrix-shaped flow
    sim:
      call:
        func: flow_as_matrix
        args: [flow_month.sim]
functions:
  - name: NSE
    kind: builtin
  - name: flow_as_matrix
    kind: external
    file: series_transform_warning.py
    args: [flow_month_sim]
derived:
  - id: nse_flow_month
    call:
      func: NSE
      args: [flow_month.sim, flow_month.obs]
objectives:
  items:
    - id: obj_nse
      desc: Maximize NSE
      ref: nse_flow_month
      sense: max
reporter:
  flushInterval: 1
  holdingPenLimit: 20
  series: []
