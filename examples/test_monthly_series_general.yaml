version: general
basic:
  projectPath: E:\BMPs\TxtInOut
  workPath: ./work
  command: swat.exe
parameters:
  design:
    - name: CN2
      type: float
      bounds: [35, 98]
    - name: ALPHA_BF
      type: float
      bounds: [0, 1]
    - name: GW_DELAY
      type: float
      bounds: [0, 500]
  physical:
    - name: CN2
      type: float
      bounds: [35, 98]
      mode: v
      writerType: fixed_width
      file:
        name: '*.mgt'
        line: 11
        start: 1
        width: 16
        precision: 2
        maxNum: 1
    - name: ALPHA_BF
      type: float
      bounds: [0, 1]
      mode: v
      writerType: fixed_width
      file:
        name: '*.gw'
        line: 5
        start: 1
        width: 16
        precision: 4
        maxNum: 1
    - name: GW_DELAY
      type: float
      bounds: [0, 500]
      mode: v
      writerType: fixed_width
      file:
        name: '*.gw'
        line: 4
        start: 1
        width: 16
        precision: 4
        maxNum: 1
  hardBound: true
series:
  - id: flow_month
    desc: Monthly streamflow with month period
    sim:
      file: output.rch
      colSpan: [50, 61]
      readerType: text
      rowRanges:
        - [133, 753, 62]
        - [877, 1559, 62]
        - [1683, 2303, 62]
    obs:
      file: obs_flow_monthly.txt
      rowRanges:
        - [2, 35]
      colSpan: [1, 12]
      readerType: text
    size: 34
  - id: flow_date
    desc: Monthly streamflow with date period
    sim:
      file: output.rch
      colSpan: [50, 61]
      readerType: text
      rowRanges:
        - [133, 753, 62]
        - [877, 1559, 62]
        - [1683, 2303, 62]
    obs:
      file: obs_flow_monthly.txt
      rowRanges:
        - [2, 35]
      colSpan: [1, 12]
      readerType: text
    size: 34
functions:
  - name: NSE
    kind: builtin
  - name: RMSE
    kind: builtin
  - name: flow_times_two
    kind: external
    file: series_transform.py
    args: [flow_month_sim]
  - name: series_equal
    kind: external
    file: series_transform.py
    args: [flow_month_sim, flow_date_sim]
derived:
  - id: nse_flow_month
    call:
      func: NSE
      args: [flow_month.sim, flow_month.obs]
  - id: rmse_flow_month
    call:
      func: RMSE
      args: [flow_month.sim, flow_month.obs]
  - id: flow_month_times_two
    call:
      func: flow_times_two
      args: [flow_month.sim]
  - id: period_series_equal
    call:
      func: series_equal
      args: [flow_month.sim, flow_date.sim]
objectives:
  items:
    - id: obj_nse
      desc: Maximize NSE
      ref: nse_flow_month
      sense: max
diagnostics:
  items:
    - id: diag_rmse
      name: RMSE flow
      ref: rmse_flow_month
    - id: diag_flow_times_two
      name: Flow times two
      ref: flow_month_times_two
    - id: diag_period_equal
      name: Period series equal
      ref: period_series_equal
reporter:
  flushInterval: 50
  holdingPenLimit: 20
  series: []
