version: general
basic:
  projectPath: E:\BMPs\TxtInOut
  workPath: ./work
  command: swat.exe
parameters:
  design:
    - name: CN2
      type: float
      bounds: [35, 98]
    - name: ALPHA_BF
      type: float
      bounds: [0, 1]
    - name: GW_DELAY
      type: float
      bounds: [0, 500]
  physical:
    - name: CN2
      type: float
      bounds: [35, 98]
      mode: v
      writerType: fixed_width
      file:
        name: '*.mgt'
        line: 11
        start: 1
        width: 16
        precision: 2
        maxNum: 1
    - name: ALPHA_BF
      type: float
      bounds: [0, 1]
      mode: v
      writerType: fixed_width
      file:
        name: '*.gw'
        line: 5
        start: 1
        width: 16
        precision: 4
        maxNum: 1
    - name: GW_DELAY
      type: float
      bounds: [0, 500]
      mode: v
      writerType: fixed_width
      file:
        name: '*.gw'
        line: 4
        start: 1
        width: 16
        precision: 4
        maxNum: 1
  hardBound: true
series:
  - id: flow
    desc: Monthly streamflow at outlet
    sim:
      file: output.rch
      colSpan: [50, 61]
      readerType: text
      rowRanges:
        - [71, 753, 62]
        - [877, 1559, 62]
        - [1683, 2365, 62]
    obs:
      file: obs_flow_monthly.txt
      rowRanges:
        - [1, 36]
      colSpan: [1, 12]
      readerType: text
    size: 36
functions:
  - name: NSE
    kind: builtin
derived:
  - id: nse_flow
    call:
      func: NSE
      args: [flow.sim, flow.obs]
objectives:
  - id: obj_nse
    desc: Maximize NSE
    ref: nse_flow
    sense: max
reporter:
  flushInterval: 50
  holdingPenLimit: 20
  series: []



