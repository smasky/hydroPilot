series:
  - id: flow
    desc: Monthly streamflow at outlet
    sim:
      file: output.rch
      colSpan: [51, 61]
      readerType: text
      rowRanges:
        - [71, 753, 62]
        - [877, 1559, 62]
        - [1683, 2365, 62]
    size: 36
    obs:
      file: ../../../examples/obs_flow_monthly.txt
      rowRanges:
        - [1, 36]
      colSpan: [1, 12]
      readerType: text
  - id: tn
    desc: Monthly total nitrogen at outlet
    sim:
      file: output.rch
      colSpan: [544, 553]
      readerType: text
      rowRanges:
        - [71, 753, 62]
        - [877, 1559, 62]
        - [1683, 2365, 62]
    size: 36
    obs:
      file: ../../../examples/obs_tn_monthly.txt
      rowRanges:
        - [1, 36]
      colSpan: [1, 12]
      readerType: text
derived:
  - id: nse_flow
    desc: nse_flow
    call:
      func: NSE
      args: [flow.sim, flow.obs]
  - id: nse_tn
    desc: nse_tn
    call:
      func: NSE
      args: [tn.sim, tn.obs]
  - id: kge_flow
    desc: kge_flow
    call:
      func: KGE
      args: [flow.sim, flow.obs]
  - id: rmse_flow
    desc: rmse_flow
    call:
      func: RMSE
      args: [flow.sim, flow.obs]
  - id: annual_tn
    desc: annual_tn
    call:
      func: calc_annual_tn_load
      args: [tn.sim]
objectives:
  - id: obj_nse_flow
    ref: nse_flow
    desc: Maximize NSE for flow
    sense: max
    on_error: -.inf
  - id: obj_nse_tn
    ref: nse_tn
    desc: Maximize NSE for TN
    sense: max
    on_error: -.inf
diagnostics:
  - id: diag_kge
    ref: kge_flow
    name: KGE flow
    on_error: .nan
  - id: diag_rmse
    ref: rmse_flow
    name: RMSE flow
    on_error: .nan
  - id: diag_tn_load
    ref: annual_tn
    name: Annual TN load
    on_error: .nan
reporter:
  flushInterval: 50
  holdingPenLimit: 20
  series: []
